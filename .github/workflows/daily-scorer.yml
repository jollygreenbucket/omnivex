name: Omnivex Daily Scorer

on:
  schedule:
    # Run at 4:30 PM EST (21:30 UTC) Monday–Friday — 30 min after market close
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab
    inputs:
      demo:
        description: 'Run in demo mode (small universe)'
        required: false
        default: 'false'

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r omnivex/requirements.txt

      - name: Run Omnivex scorer
        working-directory: ./omnivex
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          if [ "${{ github.event.inputs.demo }}" = "true" ]; then
            python run_daily.py --demo --verbose
          else
            python run_daily.py --verbose
          fi

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: omnivex-audit-${{ github.run_id }}
          path: omnivex/logs/*.csv
          retention-days: 90

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: omnivex-report-${{ github.run_id }}
          path: omnivex/reports/*.html
          retention-days: 30

      - name: Trigger Vercel redeploy
        if: success()
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail --silent
        continue-on-error: true
